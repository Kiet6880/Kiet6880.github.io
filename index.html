document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

); \"mid\" hover */\n      --mint:    #dee2e6;\n      --forest:  #343a40;\n      --mid:     #495057;\n    }\n\n    html { scroll-behavior: smooth; }\n    body { font-family: 'Josefin Sans', sans-serif; overflow-x: hidden; }\n\n    /* ── NAV ── */\n    nav {\n      position: fixed; top: 0; left: 0; right: 0; z-index: 500;\n      height: 56px;\n      display: flex; align-items: center; justify-content: space-between;\n      padding: 0 2.5rem;\n      background: rgba(33,37,41,0.85);\n      backdrop-filter: blur(20px);\n      border-bottom: 1px solid var(--dk-bdr);\n      transition: height .3s, background .3s, box-shadow .3s;\n    }\n    nav.scrolled { height: 48px; background: rgba(33,37,41,.96); box-shadow: 0 2px 20px rgba(0,0,0,.4); }\n    .nav-logo {\n      font-family: 'Josefin Sans', sans-serif; font-size: .95rem; font-weight: 800;\n      color: var(--dk-text); letter-spacing: -.02em;\n      display: flex; align-items: center; gap: .5rem;\n    }\n    .nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mint); animation: pulse 2s infinite; }\n    .nav-links { display: flex; gap: .1rem; list-style: none; }\n    .nav-links a {\n      display: block; padding: .35rem .85rem;\n      text-decoration: none; color: var(--dk-mut);\n      font-size: .78rem; font-weight: 400; border-radius: 3px; transition: color .2s;\n    }\n    .nav-links a:hover, .nav-links a.active { color: var(--dk-text); }\n    .nav-cta {\n      padding: .4rem 1.1rem !important; background: var(--dk-text) !important;\n      color: var(--dk) !important; font-weight: 700 !important;\n      font-size: .75rem !important; border-radius: 3px !important; transition: background .2s !important;\n    }\n    .nav-cta:hover { background: var(--mint) !important; }\n\n    /* ── HERO ── */\n    #hero {\n      height: 100vh; background: var(--dk);\n      display: grid; grid-template-rows: 1fr auto auto;\n      padding: 56px 2.5rem 0; position: relative; overflow: hidden;\n    }\n\n    /* subtle ambient glow — soft cool light from upper-right where the globe sits */\n    #hero::before {\n      content: '';\n      position: absolute; inset: 0; pointer-events: none; z-index: 0;\n      background:\n        radial-gradient(ellipse 65% 55% at 78% 35%, rgba(206,212,218,0.08) 0%, transparent 70%),\n        radial-gradient(ellipse 55% 45% at 15% 90%, rgba(173,181,189,0.04) 0%, transparent 65%);\n    }\n\n    #hero-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }\n    #hero > *:not(#hero-canvas):not(::before) { position: relative; z-index: 1; }\n\n    .hero-top { display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 1.5rem; }\n    .hero-badge {\n      display: inline-flex; align-items: center; gap: .5rem;\n      padding: .28rem .75rem; border: 1px solid rgba(222,226,230,.22); border-radius: 2px;\n      font-size: .63rem; font-weight: 500; color: var(--dk-text);\n      letter-spacing: .12em; text-transform: uppercase;\n      margin-bottom: 1.25rem; width: fit-content;\n      opacity: 0; animation: fadeUp .5s .1s ease forwards;\n    }\n    .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--mint); animation: pulse 2s infinite; }\n\n    .hero-headline {\n      font-family: 'Josefin Sans', sans-serif;\n      font-size: clamp(2.6rem, 6.5vw, 6.5rem);\n      font-weight: 800; line-height: 1.05; letter-spacing: -.03em; color: var(--dk-text);\n    }\n    /* fix clipping — word spans need padding room */\n    .hero-headline .word { display: inline-block; overflow: hidden; padding-bottom: 0.1em; }\n    .hero-headline .word-inner { display: inline-block; transform: translateY(110%); animation: slideUp .65s cubic-bezier(.22,1,.36,1) forwards; }\n    .w1 .word-inner { animation-delay: .18s; }\n    .w2 .word-inner { animation-delay: .28s; }\n    .w3 .word-inner { animation-delay: .38s; color: var(--mint); }\n    .w4 .word-inner { animation-delay: .48s; }\n    .w5 .word-inner { animation-delay: .58s; }\n    .w6 .word-inner { animation-delay: .68s; color: var(--mint); }\n\n    .hero-bottom-row {\n      display: flex; align-items: flex-end; justify-content: space-between;\n      gap: 2rem; padding: 1.5rem 0; border-top: 1px solid var(--dk-bdr);\n      opacity: 0; animation: fadeUp .6s .8s ease forwards;\n    }\n    .hero-sub { font-size: .9rem; font-weight: 300; color: var(--dk-mut); max-width: 380px; line-height: 1.7; }\n    .hero-sub strong { color: var(--dk-text); font-weight: 500; }\n    .hero-cta-group { display: flex; gap: .6rem; flex-shrink: 0; }\n\n    .hero-strip {\n      display: grid; grid-template-columns: repeat(4,1fr);\n      border-top: 1px solid var(--dk-bdr);\n      opacity: 0; animation: fadeUp .6s 1s ease forwards;\n    }\n    .hero-strip-item { padding: .85rem 1rem; border-right: 1px solid var(--dk-bdr); text-align: center; }\n    .hero-strip-item:last-child { border-right: none; }\n    .strip-val { font-family: 'Josefin Sans', sans-serif; font-size: 1.1rem; font-weight: 800; color: var(--dk-text); letter-spacing: -.03em; }\n    .strip-val em { color: var(--mint); font-style: normal; }\n    .strip-label { font-size: .56rem; color: rgba(173,181,189,.7); text-transform: uppercase; letter-spacing: .1em; margin-top: .1rem; }\n\n    /* ── BUTTONS ── */\n    .btn-primary {\n      padding: .75rem 1.75rem; background: var(--dk-text); color: var(--dk);\n      text-decoration: none; font-size: .82rem; font-weight: 700;\n      border-radius: 3px; transition: background .2s, transform .2s; display: inline-block;\n    }\n    .btn-primary:hover { background: var(--mint); transform: translateY(-2px); }\n    .btn-ghost {\n      padding: .75rem 1.75rem; background: transparent;\n      text-decoration: none; font-size: .82rem; font-weight: 400;\n      border-radius: 3px; transition: all .2s; display: inline-block;\n    }\n    /* dark context ghost */\n    .s-dark .btn-ghost { border: 1px solid rgba(222,226,230,.25); color: var(--dk-text); }\ 9],[11,58],[12,60],[14,63],[18,66],[22,68],[28,70],\n     [30,69],[28,67],[24,65],[20,63],[15,60],[10,58],[5,58]],\n    // Russia / N. Asia (one big mass)\n    [[28,70],[40,68],[55,67],[70,68],[80,72],[95,73],[110,73],[125,73],\n     [140,72],[155,70],[170,68],[180,66],[180,60],[170,60],[160,58],\n     [150,55],[140,55],[135,52],[130,48],[125,45],[120,45],[110,45],\n     [95,50],[80,52],[70,52],[60,53],[50,53],[42,50],[35,50],[30,55],\n     [28,60],[28,65],[28,70]],\n    // China / E. Asia\n    [[75,40],[85,40],[95,42],[105,40],[112,38],[120,38],[122,40],\n     [124,40],[122,32],[120,30],[122,25],[118,22],[115,22],[110,21],\n     [108,18],[105,15],[102,12],[100,10],[100,8],[102,5],[103,2],\n     [105,1],[108,3],[110,5],[112,12],[110,18],[107,22],[103,22],\n     [100,25],[97,28],[92,28],[88,26],[80,30],[75,32],[72,33],[75,40]],\n    // India\n    [[68,23],[72,21],[75,20],[78,17],[80,13],[80,9],[78,8],[76,9],\n     [73,10],[70,15],[68,20],[68,23]],\n    // Middle East / Arabia\n    [[35,37],[38,37],[42,37],[45,40],[48,38],[50,32],[52,28],[55,25],\n     [58,22],[60,18],[55,15],[50,13],[45,12],[42,15],[40,20],[38,25],\n     [35,29],[33,30],[32,32],[35,35],[35,37]],\n    // Africa (more accurate horn + west)\n    [[-17,21],[-15,17],[-15,12],[-13,9],[-11,6],[-8,5],[-5,4],[-2,5],\n     [2,5],[6,4],[8,4],[10,3],[11,1],[10,-2],[12,-5],[13,-8],[14,-11],\n     [13,-15],[15,-18],[17,-22],[18,-26],[20,-30],[24,-32],[28,-32],\n     [31,-30],[33,-27],[34,-23],[36,-20],[38,-16],[40,-12],[40,-8],\n     [42,-3],[42,2],[45,5],[50,9],[51,11],[51,8],[48,8],[44,10],\n     [42,13],[43,15],[42,17],[40,20],[38,22],[35,24],[33,28],[31,31],\n     [30,32],[28,31],[25,32],[20,32],[15,32],[10,33],[5,32],[0,30],\n     [-3,28],[-6,28],[-9,28],[-12,25],[-15,23],[-17,21]],\n    // Madagascar\n    [[44,-12],[48,-13],[50,-16],[50,-22],[47,-25],[44,-22],[43,-18],[44,-12]],\n    // Australia\n    [[114,-22],[115,-25],[115,-32],[118,-35],[122,-34],[126,-32],\n     [130,-32],[134,-33],[138,-36],[141,-38],[145,-38],[148,-37],\n     [151,-34],[153,-29],[152,-25],[148,-23],[146,-19],[142,-12],\n     [140,-12],[136,-13],[132,-12],[130,-13],[126,-14],[122,-17],\n     [118,-20],[114,-22]],\n    // New Guinea\n    [[131,-2],[140,-2],[150,-6],[150,-10],[140,-9],[133,-4],[131,-2]],\n    // Indonesia: Sumatra\n    [[95,5],[100,3],[103,1],[106,-1],[106,-5],[102,-5],[98,-2],[95,5]],\n    // Java\n    [[105,-6],[110,-7],[114,-8],[114,-9],[108,-8],[105,-6]],\n    // Borneo\n    [[109,-2],[114,-3],[118,1],[119,5],[115,7],[111,5],[109,-2]],\n    // Sulawesi (rough)\n    [[120,1],[123,2],[125,1],[123,-3],[121,-5],[119,-3],[120,1]],\n    // Philippines (rough)\n    [[120,7],[122,9],[125,9],[126,12],[124,15],[121,17],[120,14],[120,7]],\n    // Japan\n    [[129,32],[133,33],[136,35],[139,36],[141,39],[143,42],[145,44],\n     [142,43],[139,38],[135,34],[131,33],[129,32]],\n    // New Zealand\n    [[173,-35],[176,-37],[178,-39],[176,-41],[173,-41],[173,-35]],\n    [[166,-46],[170,-46],[174,-43],[172,-46],[167,-47],[166,-46]],\n    // Antarctica\n    [[-180,-65],[-150,-72],[-100,-72],[-50,-70],[0,-68],[50,-68],\n     [100,-67],[150,-72],[180,-65],[180,-90],[-180,-90],[-180,-65]],\n  ];\n\n  function drawMap() {\n    oc.fillStyle = '#000'; oc.fillRect(0,0,MAP_W,MAP_H);\n    oc.fillStyle = '#fff';\n    continents.forEach(poly => {\n      oc.beginPath();\n      poly.forEach(([lon,lat], i) => {\n        const [x,y] = ll2px(lon, lat);\n        if (i===0) oc.moveTo(x,y); else oc.lineTo(x,y);\n      });\n      oc.closePath(); oc.fill();\n    });\n  }\n\n  let mask = null;\n  function sampleLand(lonDeg, latDeg) {\n    if (!mask) return false;\n    const x = ((Math.round((lonDeg+180)/360*MAP_W) % MAP_W) + MAP_W) % MAP_W;\n    const y = Math.max(0, Math.min(MAP_H-1, Math.round((90-latDeg)/180*MAP_H)));\n    return mask[(y*MAP_W + x)*4] > 128;\n  }\n\n  // ── 2. DENSE SCATTERED DOTS via Fibonacci sphere + jitter ──\n  const dots = [];\n  function buildDots() {\n    dots.length = 0;\n    const N = 30000; // very dense\n    const phi = Math.PI*(Math.sqrt(5)-1);\n    for (let i = 0; i < N; i++) {\n      const y = 1 - (i/(N-1))*2;\n      const r = Math.sqrt(1 - y*y);\n      const theta = phi*i;\n      let x = Math.cos(theta)*r, z = Math.sin(theta)*r;\n      // small jitter so pattern looks scattered, not algorithmic\n      const jit = 0.012;\n      x += (Math.random()-0.5)*jit;\n      const yj = y + (Math.random()-0.5)*jit;\n      z += (Math.random()-0.5)*jit;\n      const len = Math.sqrt(x*x + yj*yj + z*z);\n      const nx=x/len, ny=yj/len, nz=z/len;\n      const lat = Math.asin(ny)*180/Math.PI;\n      const lon = Math.atan2(nz, nx)*180/Math.PI;\n      if (!sampleLand(lon, lat)) continue;\n      // assign each dot a tone bucket: white / silver / mid grey / dark grey\n      const roll = Math.random();\n      let tone;\n      if (roll < 0.30)      tone = [248,249,250]; // white\n      else if (roll < 0.60) tone = [222,226,230]; // silver\n      else if (roll < 0.85) tone = [173,181,189]; // mid grey\n      else                  tone = [108,117,125]; // dark grey\n      dots.push({ ox:nx, oy:ny, oz:nz, sz: 0.5 + Math.random()*0.9, tone });\n    }\n  }\n\n  // ── 3. CITIES + ARCS ──\n  const cities = [\n    {name:'Houston',  lat:29.76, lon:-95.37, home:true},\n    {name:'New York', lat:40.71, lon:-74.00},\n    {name:'San Fran', lat:37.77, lon:-122.42},\n    {name:'London',   lat:51.51, lon:-0.13},\n    {name:'Singapore',lat: 1.35, lon:103.82},\n    {name:'Tokyo',    lat:35.68, lon:139.69},\n    {name:'Sydney',   lat:-33.87,lon:151.21},\n    {name:'Dubai',    lat:25.20, lon:55.27},\n    {name:'Berlin',   lat:52.52, lon:13.40},\n    {name:'São Paulo',lat:-23.55,lon:-46.63},\n    {name:'Mumbai',   lat:19.08, lon:72.88},\n  ];\n  cities.forEach(c=>{\n    const lr=c.lat*Math.PI/180, lo=c.lon*Math.PI/180;\n    c.ox = Math.cos(lr)*Math.cos(lo);\n    c.oy = Math.sin(lr);\n    c.oz = Math.cos(lr)*Math.sin(lo);\n  });\n\n  const arcRoutes = [\n    [0,1],[0,2],[0,3],[0,9],[3,5],[5,6],[3,4],[4,5],[7,8],[1,3],[2,5],[9,10],[3,7]\n  ];\n  const arcs = arcRoutes.map((r, idx)=>({\n    a: r[0], b: r[1],\n    t: -idx*0.28 - Math.random()*1.2,\n    dur: 2.6 + Math.random()*1.4,\n    gap: 1.4 + Math.random()*1.6,\n  }));\n\n  function slerp(p1, p2, t) {\n    const dot = Math.max(-1, Math.min(1, p1[0]*p2[0]+p1[1]*p2[1]+p1[2]*p2[2]));\n    const omega = Math.acos(dot);\n    if (omega < 1e-4) return [p1[0],p1[1],p1[2]];\n    const so = Math.sin(omega);\n    const a = Math.sin((1-t)*omega)/so, b = Math.sin(t*omega)/so;\n    return [p1[0]*a+p2[0]*b, p1[1]*a+p2[1]*b, p1[2]*a+p2[2]*b];\n  }\n  function arcPoint(p1,p2,t) {\n    const s = slerp(p1,p2,t);\n    const lift = 1 + Math.sin(t*Math.PI)*0.18;\n    return [s[0]*lift, s[1]*lift, s[2]*lift];\n  }\n\n  function rot(x,y,z,rx,ry) {\n    const cy=Math.cos(ry), sy=Math.sin(ry);\n    const nx=x*cy+z*sy, nz=-x*sy+z*cy;\n    const cxr=Math.cos(rx), sxr=Math.sin(rx);\n    return [nx, y*cxr - nz*sxr, y*sxr + nz*cxr];\n  }\n\n  let last = performance.now();\n  function draw(now) {\n    const dt = Math.min(0.05, (now-last)/1000); last = now;\n    cx.clearRect(0,0,W,H);\n\n    const R  = Math.min(W,H)*0.44;\n    const ox = W*0.70, oy = H*0.50;\n\n    const tVX = mouse.active ? (mouse.y/H-0.5)*0.0010 : 0;\n    const tVY = mouse.active ? (mouse.x/W-0.5)*0.0010 - 0.0006 : -0.0006;\n    velX += (tVX-velX)*0.04; velY += (tVY-velY)*0.04;\n    rotX += velX; rotY += velY;\n\n    function project(x,y,z){\n      const [rx,ry,rz] = rot(x,y,z,rotX,rotY);\n      const sc = 1/(1+rz*0.18);\n      return [ox+rx*R*sc, oy+ry*R*sc, rz, sc];\n    }\n\n    // Soft halo behind globe\n    const halo = cx.createRadialGradient(ox,oy,R*0.7, ox,oy,R*1.15);\n    halo.addColorStop(0,    'rgba(248,249,250,0)');\n    halo.addColorStop(0.7,  'rgba(206,212,218,0.04)');\n    halo.addColorStop(1,    'rgba(206,212,218,0)');\n    cx.beginPath(); cx.arc(ox,oy,R*1.15,0,Math.PI*2);\n    cx.fillStyle = halo; cx.fill();\n\n    // ── Dots only on FRONT hemisphere — fade toward limb (rim) like reference ──\n    dots.forEach(d=>{\n      const [rx,ry,rz] = rot(d.ox,d.oy,d.oz,rotX,rotY);\n      if (rz < -0.05) return; // skip far-back dots entirely (clean look)\n      const sc = 1/(1+rz*0.18);\n      const x = ox + rx*R*sc;\n      const y = oy + ry*R*sc;\n\n      // depth 0..1 (front=1, rim≈0)\n      const t = Math.max(0, Math.min(1, (rz+0.05)/1.05));\n      // fade dots that are near the silhouette so the rim feathers softly\n      const limbFade = Math.pow(t, 0.55);\n      const a = 0.30 + limbFade*0.65;\n      const sz = (0.55 + t*0.55) * d.sz;\n\n      cx.beginPath();\n      cx.arc(x, y, sz, 0, Math.PI*2);\n      const tn = d.tone;\n      cx.fillStyle = 'rgba('+tn[0]+','+tn[1]+','+tn[2]+','+a+')';\n      cx.fill();\n    });\n\n    // Arcs\n    arcs.forEach(arc => {\n      arc.t += dt / arc.dur;\n      if (arc.t > 1 + arc.gap/arc.dur) arc.t = -Math.random()*0.4;\n      if (arc.t < 0) return;\n      const t = Math.min(1, arc.t);\n      const head = t;\n      const tailLen = 0.32;\n      const tail = Math.max(0, head - tailLen);\n      const segs = 24;\n      const A = cities[arc.a], B = cities[arc.b];\n      const p1 = [A.ox,A.oy,A.oz], p2 = [B.ox,B.oy,B.oz];\n      for (let i = 0; i < segs; i++) {\n        const u0 = tail + (head-tail) * (i/segs);\n        const u1 = tail + (head-tail) * ((i+1)/segs);\n        if (u0 >= 1 || u1 <= 0) continue;\n        const a3 = arcPoint(p1,p2,u0);\n        const b3 = arcPoint(p1,p2,u1);\n        const pa = project(a3[0],a3[1],a3[2]);\n        const pb = project(b3[0],b3[1],b3[2]);\n        if (pa[2] < -0.05 || pb[2] < -0.05) continue;\n        const fade = (i+1)/segs;\n        const alpha = 0.6 * fade * (1 - Math.pow(1-Math.min(1,head*1.6), 2));\n        cx.strokeStyle = 'rgba(248,249,250,'+alpha+')';\n        cx.lineWidth = 1.05 * fade + 0.25;\n        cx.beginPath(); cx.moveTo(pa[0],pa[1]); cx.lineTo(pb[0],pb[1]); cx.stroke();\n      }\n      if (head < 1) {\n        const h = arcPoint(p1,p2,head);\n        const ph = project(h[0],h[1],h[2]);\n        if (ph[2] >= -0.05) {\n          const headA = 0.95 * (1 - Math.pow(1-Math.min(1,head*2),3));\n          const grad = cx.createRadialGradient(ph[0],ph[1],0, ph[0],ph[1],6);\n          grad.addColorStop(0, 'rgba(248,249,250,'+headA+')');\n          grad.addColorStop(1, 'rgba(248,249,250,0)');\n          cx.fillStyle = grad;\n          cx.beginPath(); cx.arc(ph[0],ph[1],6,0,Math.PI*2); cx.fill();\n          cx.fillStyle = 'rgba(248,249,250,'+Math.min(1,headA*1.2)+')';\n          cx.beginPath(); cx.arc(ph[0],ph[1],1.6,0,Math.PI*2); cx.fill();\n        }\n      }\n    });\n\n    // City markers\n    const time = now/1000;\n    cities.forEach(c=>{\n      const pr = project(c.ox,c.oy,c.oz);\n      if (pr[2] < 0) return;\n      const baseA = 0.95;\n      const pulse = (Math.sin(time*1.4 + (c.lon+c.lat))+1)/2;\n      const ringR = 3 + pulse*5;\n      cx.strokeStyle = 'rgba(248,249,250,'+(0.35*baseA*(1-pulse))+')';\n      cx.lineWidth = 0.8;\n      cx.beginPath(); cx.arc(pr[0],pr[1],ringR,0,Math.PI*2); cx.stroke();\n      cx.fillStyle = 'rgba(248,249,250,'+baseA+')';\n      cx.beginPath(); cx.arc(pr[0],pr[1], c.home?2.4:1.6, 0, Math.PI*2); cx.fill();\n      if (c.home) {\n        cx.strokeStyle = 'rgba(248,249,250,'+(0.6*baseA)+')';\n        cx.lineWidth = 1;\n        cx.beginPath(); cx.arc(pr[0],pr[1],4.5,0,Math.PI*2); cx.stroke();\n      }\n    });\n\n    requestAnimationFrame(draw);\n  }\n\n  function init() {\n    drawMap();\n    mask = oc.getImageData(0,0,MAP_W,MAP_H).data;\n    buildDots();\n    requestAnimationFrame(draw);\n  }\n  init();\n  window.addEventListener('resize', resize);\n  document.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; mouse.active=true; });\n  document.addEventListener('mouseleave', ()=>{ mouse.active=false; });\n})();\n\n// ── NAV ──\nconst nav = document.getElementById('main-nav');\nconst navLinks = document.querySelectorAll('.nav-links a:not(.nav-cta)');\nconst sections = document.querySelectorAll('section[id]');\nwindow.addEventListener('scroll', ()=>{\n  nav.classList.toggle('scrolled', window.scrollY > 60);\n  let cur='';\n  sections.forEach(s=>{ if(window.scrollY>=s.offsetTop-100) cur=s.id; });\n  navLinks.forEach(a=>{ a.classList.toggle('active', a.getAttribute('href')==='#'+cur); });\n}, {passive:true});\n\n// ── SCROLL REVEAL ──\nconst ro = new IntersectionObserver((entries)=>{\n  entries.forEach((e,i)=>{ if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('visible'),i*70); ro.unobserve(e.target); } });\n},{threshold:.1});\ndocument.querySelectorAll('.reveal').forEach(el=>ro.observe(el));\n\n// ── COUNTER ──\nconst co = new IntersectionObserver((entries)=>{\n  entries.forEach(entry=>{\n    if(!entry.isIntersecting) return;\n    entry.target.querySelectorAll('.count').forEach(el=>{\n      const target=+el.dataset.target, dur=1000, start=performance.now();\n      const tick=now=>{ const p=Math.min((now-start)/dur,1), ease=1-Math.pow(1-p,3); el.textContent=Math.floor(ease*target); if(p<1) requestAnimationFrame(tick); else el.textContent=target; };\n      requestAnimationFrame(tick);\n    });\n    co.unobserve(entry.target);\n  });\n},{threshold:.4});\ndocument.querySelectorAll('.stats-grid').forEach(el=>co.observe(el));\n\n// ── MAGNETIC BUTTONS ──\ndocument.querySelectorAll('.btn-primary,.btn-ghost').forEach(btn=>{\n  btn.addEventListener('mousemove',e=>{ const r=btn.getBoundingClientRect(); btn.style.transform=`translate(${(e.clientX-r.left-r.width/2)*.15}px,${(e.clientY-r.top-r.height/2)*.18}px)`; });\n  btn.addEventListener('mouseleave',()=>{ btn.style.transition='transform .5s cubic-bezier(.22,1,.36,1),background .2s'; btn.style.transform=''; setTimeout(()=>btn.style.transition='',500); });\n});\n\n// ── PROCESS STAGGER ──\nconst po = new IntersectionObserver(entries=>{\n  entries.forEach(entry=>{\n    if(!entry.isIntersecting) return;\n    entry.target.querySelectorAll('.process-item').forEach((item,i)=>{\n      item.style.opacity='0'; item.style.transform='translateX(-16px)';\n      setTimeout(()=>{ item.style.transition='opacity .5s ease,transform .5s cubic-bezier(.22,1,.36,1),padding .25s'; item.style.opacity='1'; item.style.transform='none'; },i*110);\n    });\n    po.unobserve(entry.target);\n  });\n},{threshold:.15});\ndocument.querySelectorAll('.process-list').forEach(el=>po.observe(el));\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
